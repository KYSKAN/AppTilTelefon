<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f3460">
  <title>Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 32px 16px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { color: #e2e8f0; font-size: 22px; margin-bottom: 8px; }
    p { color: #718096; font-size: 14px; margin-bottom: 40px; }
    .back-btn {
      background: #16213e;
      color: #63b3ed;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 15px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div class="icon">📝</div>
  <h1>Quiz</h1>
  <p>Kommer snart</p>
  <a class="back-btn" href="../">← Tilbake</a>
</body>
</html>
