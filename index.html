<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Elektriker">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f3460">
  <title>Elektriker-app</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 32px 16px;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }
    h1 {
      color: #e2e8f0;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      color: #63b3ed;
      font-size: 13px;
      margin-bottom: 48px;
    }
    .nav-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 320px;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 20px;
      background: #16213e;
      border: none;
      border-radius: 18px;
      padding: 22px 24px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { background: #1a3a5c; }
    .nav-btn .icon {
      font-size: 32px;
      width: 44px;
      text-align: center;
      flex-shrink: 0;
    }
    .nav-btn .text { text-align: left; }
    .nav-btn .text strong {
      display: block;
      color: #e2e8f0;
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .nav-btn .text span {
      color: #718096;
      font-size: 12px;
    }
    .nav-btn .arrow {
      margin-left: auto;
      color: #63b3ed;
      font-size: 18px;
    }
    #appVersion {
      position: fixed;
      bottom: 8px;
      right: 10px;
      font-size: 10px;
      color: #2d4a6e;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="logo">⚡</div>
  <h1>Elektriker-app</h1>
  <p class="subtitle">Verktøy for elektrikere</p>

  <div class="nav-grid">
    <a class="nav-btn" href="kalkulator/">
      <div class="icon">🧮</div>
      <div class="text">
        <strong>Kalkulatorer</strong>
        <span>Kabel, vern, Ohms lov, vekselspenning</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="nav-btn" href="quiz/">
      <div class="icon">📝</div>
      <div class="text">
        <strong>Quiz</strong>
        <span>Test kunnskapene dine</span>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <div id="appVersion"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    }
    if ('caches' in window) {
      caches.keys().then(keys => {
        const cache = keys.find(k => k.startsWith('kalkulator-'));
        if (cache) document.getElementById('appVersion').textContent = cache.replace('kalkulator-', '');
      });
    }
  </script>
</body>
</html>
